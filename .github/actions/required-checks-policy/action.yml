name: Required Checks Policy
description: Evaluates a required checks policy against changed files and waits for them to complete.

inputs:
    policyPath:
        required: false
        default: ""
        description: The path to the policy file. It is relative to the root of the git repository.
    auto-discover:
        required: false
        default: "false"
        description: |
            If 'true', auto-discovers required checks from GitHub Actions workflow files in the repository.
            Discovered checks are merged with those from the JSON policy when both are configured.
            Workflows or jobs can be excluded by adding a '# wl-not-required' comment.
    failIfNoPolicy:
        required: false
        default: "true"
        description: |
            If set to 'true', the workflow will fail if no policy is defined for the changed files.
            If set to 'false', the workflow will succeed if no policy is defined, but will not check for required checks.
    timeout-minutes-queued-checks:
        required: false
        default: "30"
        description: |
            Specifies how many minutes required checks can remain in the queued state before the workflow is canceled.
    timeout-minutes-created-checks:
        required: false
        default: "15"
        description: |
            The maximum number of minutes to let a check be created before canceling the workflow.

runs:
    using: composite
    steps:
        - name: Setup Node.js
          if: inputs.auto-discover == 'true'
          uses: actions/setup-node@v6
          with:
              node-version: lts/*

        - name: Evaluate required checks policy
          shell: pwsh
          env:
              CI_POLICY_PATH: ${{ inputs.policyPath }}
              CI_AUTO_DISCOVER: ${{ inputs.auto-discover }}
              CI_FAIL_IF_NO_POLICY: ${{ inputs.failIfNoPolicy }}
              CI_TIMEOUT_MINUTES_QUEUED_CHECKS: ${{ inputs.timeout-minutes-queued-checks }}
              CI_TIMEOUT_MINUTES_CREATED_CHECKS: ${{ inputs.timeout-minutes-created-checks }}
              REPOSITORY_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          run: |
              $ErrorActionPreference = "Stop"
              $PSNativeCommandUseErrorActionPreference = $true

              Import-Module "${{ github.action_path }}/RequiredChecksPolicy.psm1" -Force

              $refs = Resolve-Refs `
                  -CommitId $env:GITHUB_SHA `
                  -BaseRef $env:GITHUB_BASE_REF `
                  -HeadRef $env:GITHUB_HEAD_REF `
                  -RefName $env:GITHUB_REF_NAME `
                  -DefaultBranch $env:REPOSITORY_DEFAULT_BRANCH

              $diff = Get-ChangedFiles -BaseRef $refs.BaseRef -HeadRef $refs.HeadRef
              if (!$diff) {
                  Write-Host "No changes detected between '$($refs.BaseRef)' and '$($refs.HeadRef)'."
                  exit 0
              }

              Write-Host "::group::Changed files between '$($refs.BaseRef)' and '$($refs.HeadRef)'"
              $diff | ForEach-Object { Write-Host "- $_" }
              Write-Host "::endgroup::"
              Write-Host ""

              $requiredChecks = @()

              if ($env:CI_POLICY_PATH) {
                  $policy = Import-PolicyFromGit -PolicyPath $env:CI_POLICY_PATH -BaseRef $refs.BaseRef
                  $policyChecks = Find-RequiredChecks -Policy $policy -BaseRef $refs.BaseRef -HeadRef $refs.HeadRef
                  if ($policyChecks) {
                      $requiredChecks += $policyChecks
                  }
              }

              if ($env:CI_AUTO_DISCOVER -eq 'true') {
                  $autoChecks = Find-AutoDiscoveredChecks -BaseRef $refs.BaseRef -HeadRef $refs.HeadRef -ChangedFiles $diff
                  if ($autoChecks) {
                      $requiredChecks += $autoChecks
                  }
              }

              $requiredChecks = $requiredChecks | Sort-Object -Unique

              if (!$requiredChecks -or $requiredChecks.Count -eq 0) {
                  if ($env:CI_FAIL_IF_NO_POLICY -eq 'true') {
                      Write-Error "No required checks found for the changed paths, but 'failIfNoPolicy' is set to true."
                  }

                  Write-Host "No required checks found for the changed paths."
                  exit 0
              }

              Wait-RequiredChecks `
                  -RequiredChecks $requiredChecks `
                  -Repository $env:GITHUB_REPOSITORY `
                  -HeadRef $refs.HeadRef `
                  -TimeoutMinutesCreatedChecks ([int]$env:CI_TIMEOUT_MINUTES_CREATED_CHECKS) `
                  -TimeoutMinutesQueuedChecks ([int]$env:CI_TIMEOUT_MINUTES_QUEUED_CHECKS)
