# Policy format:
# [
#   {
#     "checks": ["check1", "check2"],
#     "paths": ["service1/"]
#   },
#   {
#     "checks": ["check1"],
#     "paths": ["service2/"]
#   },
# ]
on:
    workflow_call:
        inputs:
            policyPath:
                required: false
                type: string
                default: ""
                description: The path to the policy file. It is relative to the root of the git repository.
            auto-discover:
                required: false
                type: boolean
                default: true
                description: |
                  If 'true', auto-discovers required checks from GitHub Actions workflow files in the repository.
                  Discovered checks are merged with those from the JSON policy when both are configured.
                  Workflows or jobs can be excluded by adding a '# wl-not-required' comment.
            failIfNoPolicy:
                required: false
                type: boolean
                default: true
                description: |
                  If set to `true`, the workflow will fail if no policy is defined for the changed files.
                  If set to `false`, the workflow will succeed if no policy is defined, but will not check for required checks.
            timeout-minutes:
                required: false
                description: The maximum number of minutes to let a workflow run before GitHub automatically cancels it.
                type: number
                default: 360 # Same value as the default for GitHub Actions
            timeout-minutes-queued-checks:
                required: false
                description: |
                  Specifies how many minutes required checks can remain in the queued state before the workflow is canceled.
                  If checks do not start within this time, the workflow will fail, which may indicate a configuration problem.
                type: number
                default: 30
            timeout-minutes-created-checks:
                required: false
                description: |
                  The maximum number of minutes to let a check be created before canceling the workflow.
                  If checks is not created within this time, the workflow will fail, which may indicate a configuration problem.
                type: number
                default: 15

jobs:
    evaluate_policy:
        runs-on: ubuntu-latest
        timeout-minutes: ${{ inputs.timeout-minutes }}
        steps:
            - uses: actions/checkout@v5
              with:
                fetch-depth: 0
            - uses: ./.github/actions/required-checks-policy
              with:
                policyPath: ${{ inputs.policyPath }}
                auto-discover: ${{ inputs.auto-discover }}
                failIfNoPolicy: ${{ inputs.failIfNoPolicy }}
                timeout-minutes-queued-checks: ${{ inputs.timeout-minutes-queued-checks }}
                timeout-minutes-created-checks: ${{ inputs.timeout-minutes-created-checks }}
